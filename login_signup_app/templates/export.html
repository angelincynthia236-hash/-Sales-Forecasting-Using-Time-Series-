<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFRA PREDICT 📊 | Export Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #ff8c00;
            --sidebar-width: 260px;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-green: #00ff88;
            --danger-red: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: url("/static/home.jpeg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
        }

        /* --- SIDEBAR (Home Page Style) --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            position: fixed;
            padding: 30px 20px;
            border-right: 1px solid var(--glass-border);
            box-sizing: border-box;
            z-index: 100;
        }

        .nav-link {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: 0.3s;
            font-size: 14px;
        }

        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255, 140, 0, 0.15);
            color: var(--primary-orange);
        }

        /* --- CONTENT AREA --- */
        .content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 60px;
            background: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
        }

        .management-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-5px); }

        h1 { font-size: 3rem; font-weight: 800; margin: 0; letter-spacing: -1.5px; }
        .orange-text { color: var(--primary-orange); }
        .label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        /* Button Styling */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            margin-top: 15px;
        }

        .btn-orange { background: var(--primary-orange); }
        .btn-orange:hover { background: #e67e00; transform: scale(1.05); }

        .btn-danger { background: var(--danger-red); }
        .btn-danger:hover { background: #cc0000; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="sidebar">
        <span style="color: var(--primary-orange); font-size: 10px; font-weight: 800; letter-spacing: 2px;">POWER ANALYTICS</span>
        <h2 style="margin: 5px 0 35px 0;">INFRA PREDICT 📊</h2>
        
        <nav>
            <div style="margin-bottom: 20px;">
                <p style="font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-bottom: 10px; padding-left: 15px;">CORE ANALYTICS</p>
                <a href="{{ url_for('home') }}" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <a href="{{ url_for('upload') }}" class="nav-link"><i class="fas fa-upload"></i> Upload CSV</a>
                <a href="{{ url_for('predict') }}" class="nav-link"><i class="fas fa-chart-line"></i> Trends</a>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <a href="{{ url_for('export') }}" class="nav-link active"><i class="fas fa-file-export"></i> Export Center</a>
                <a href="{{ url_for('logout') }}" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>
    </div>

    <div class="content">
        <div class="hero-card">
            <span class="label">System Maintenance</span>
            <h1>Data <span class="orange-text">Management.</span></h1>
            <p style="opacity: 0.7; font-size: 1.1rem; margin-top: 10px;">Forensic tools for database integrity and reporting.</p>
        </div>

        <div class="management-grid">
            <div class="card">
                <span class="label">Reporting</span>
                <h3 style="margin: 10px 0;">System Logs</h3>
                <p style="opacity: 0.6; font-size: 14px;">Download all project records in standard CSV format for offline review.</p>
                <a href="{{ url_for('download_csv') }}" class="btn btn-orange">
                    <i class="fas fa-file-download"></i> Download CSV
                </a>
            </div>

            
        </div>
    </div>

</body>
</html>
