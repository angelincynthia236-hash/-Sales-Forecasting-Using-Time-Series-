<!DOCTYPE html>
<html lang="en">
<head>
    <title>INFRA PREDICT 📊 | Present Trends</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-orange: #ff8c00; --sidebar-width: 260px; --glass-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: url("/static/home.jpeg") no-repeat center center fixed; background-size: cover; color: white; display: flex; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); position: fixed; padding: 30px 20px; border-right: 1px solid var(--glass-border); box-sizing: border-box; }
        .nav-link { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
        .nav-link.active { background: rgba(255, 140, 0, 0.15); color: var(--primary-orange); }
        .content { margin-left: var(--sidebar-width); width: 100%; padding: 60px; background: rgba(0, 0, 0, 0.5); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid var(--glass-border); margin-bottom: 30px; }
        .ai-insight { background: rgba(255, 140, 0, 0.1); border-left: 4px solid var(--primary-orange); padding: 20px; border-radius: 10px; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="sidebar">
    <span style="color: var(--primary-orange); font-size: 10px; font-weight: 800; letter-spacing: 2px;">POWER ANALYTICS</span>
    <h2 style="margin: 5px 0 35px 0;">INFRA PREDICT 📊</h2>
    
    <nav>
        <div style="margin-bottom: 20px;">
            <p style="font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-bottom: 10px; padding-left: 15px;">CORE ANALYTICS</p>
            <a href="{{ url_for('home') }}" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="{{ url_for('upload') }}" class="nav-link"><i class="fas fa-upload"></i> Upload CSV</a>
            <a href="{{ url_for('predict') }}" class="nav-link"><i class="fas fa-chart-line"></i> Trends</a>
           

        <div style="margin-bottom: 20px;">
            <p style="font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-bottom: 10px; padding-left: 15px;">AI & STRATEGY</p>
            <a href="{{ url_for('geo_analytics') }}" class="nav-link"><i class="fas fa-globe-americas"></i> Geo-Analytics</a>
            <a href="{{ url_for('allocator') }}" class="nav-link"><i class="fas fa-pie-chart"></i> Resource Radar</a>
            <a href="{{ url_for('vault') }}" class="nav-link"><i class="fas fa-shield-alt"></i> Intelligence Vault</a>
            <a href="{{ url_for('sandbox') }}" class="nav-link"><i class="fas fa-vial"></i> Strategy Sandbox</a>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <a href="{{ url_for('logout') }}" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>
</div>

    <div class="content">
        <div class="glass-card">
            <h1>Revenue <span style="color: var(--primary-orange);">Historical Analysis</span></h1>
            <canvas id="presentChart" style="max-height: 400px; margin-top: 20px;"></canvas>

            <div class="ai-insight">
                <h4 style="margin: 0; color: var(--primary-orange);"><i class="fas fa-robot"></i> AI Smart Insight</h4>
                <p style="font-size: 14px; margin-top: 10px; line-height: 1.5;">{{ insight }}</p>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('presentChart').getContext('2d');
        const anomalies = {{ anomalies|tojson }};
        const pointColors = anomalies.map(a => a === 1 ? '#ff5252' : '#ff8c00');
        const pointRadius = anomalies.map(a => a === 1 ? 8 : 4);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ labels|tojson }},
                datasets: [{
                    label: 'Revenue',
                    data: {{ values|tojson }},
                    borderColor: '#ff8c00',
                    backgroundColor: 'rgba(255, 140, 0, 0.1)',
                    pointBackgroundColor: pointColors,
                    pointBorderColor: '#fff',
                    pointRadius: pointRadius,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#ffffff', font: { weight: 'bold' } } // WHITE NUMBERS
                    },
                    x: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#ffffff', font: { weight: 'bold' } } // WHITE LABELS
                    }
                },
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });
    </script>
</body>
</html>
